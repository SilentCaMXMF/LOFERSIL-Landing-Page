<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - LOFERSIL</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        line-height: 1.6;
        color: #333;
        background: linear-gradient(135deg, #f9fafb 0%, #e5e7eb 100%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .offline-container {
        text-align: center;
        max-width: 500px;
        padding: 2rem;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        margin: 1rem;
      }

      .offline-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        background: #228b22;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
      }

      .offline-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #111827;
        margin-bottom: 1rem;
      }

      .offline-description {
        font-size: 1rem;
        color: #6b7280;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .offline-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 0.25rem;
        border: none;
        cursor: pointer;
        transition: all 0.15s ease-in-out;
        white-space: nowrap;
        min-height: 44px;
      }

      .btn-primary {
        background-color: #228b22;
        color: #ffffff;
      }

      .btn-primary:hover {
        background-color: #1e6b1e;
        transform: translateY(-2px);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .btn-secondary {
        background-color: #ffffff;
        color: #228b22;
        border: 2px solid #228b22;
      }

      .btn-secondary:hover {
        background-color: #228b22;
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .connection-status {
        margin-top: 2rem;
        padding: 1rem;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 0.5rem;
        color: #166534;
        font-size: 0.875rem;
      }

      .connection-status.offline {
        background: #fef2f2;
        border-color: #fecaca;
        color: #dc2626;
      }

      @media (max-width: 768px) {
        .offline-container {
          margin: 1rem 0.5rem;
          padding: 1.5rem;
        }

        .offline-actions {
          flex-direction: column;
          align-items: center;
        }

        .btn {
          width: 100%;
          max-width: 250px;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📵</div>

      <h1 class="offline-title">Está Offline</h1>

      <p class="offline-description">
        Parece que não tem ligação à internet. Algumas funcionalidades podem não
        estar disponíveis. Pode continuar a navegar no conteúdo que já foi
        carregado.
      </p>

      <div class="offline-actions">
        <button class="btn btn-primary" onclick="window.location.reload()">
          Tentar Novamente
        </button>
        <a href="/" class="btn btn-secondary"> Página Inicial </a>
      </div>

      <div id="connection-status" class="connection-status offline">
        <span id="status-text">Verificando ligação...</span>
      </div>
    </div>

    <script>
      // Monitor connection status
      function updateConnectionStatus() {
        const statusElement = document.getElementById("connection-status");
        const statusText = document.getElementById("status-text");

        if (navigator.onLine) {
          statusElement.className = "connection-status";
          statusText.textContent = "Ligação restaurada";

          // Auto-reload after 2 seconds if back online
          setTimeout(() => {
            window.location.reload();
          }, 2000);
        } else {
          statusElement.className = "connection-status offline";
          statusText.textContent = "Ainda offline";
        }
      }

      // Listen for connection changes
      window.addEventListener("online", updateConnectionStatus);
      window.addEventListener("offline", updateConnectionStatus);

      // Initial check
      updateConnectionStatus();

      // Periodic connection check
      setInterval(() => {
        if (navigator.onLine) {
          fetch("/api/health", {
            method: "HEAD",
            cache: "no-cache",
          })
            .then(() => {
              updateConnectionStatus();
            })
            .catch(() => {
              // Still offline
            });
        }
      }, 10000); // Check every 10 seconds
    </script>
  </body>
</html>
