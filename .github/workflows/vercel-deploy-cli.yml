name: Deploy to Vercel (CLI Direct)

on:
  push:
    branches: [preview-deployment]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Setup Vercel CLI
        run: |
          echo "=== SETTING UP VERCEL ==="
          npm install -g vercel@latest

          mkdir -p ~/.vercel

          echo '{"token":"'${{ secrets.VERCEL_TOKEN }}'","teamId":"'${{ secrets.VERCEL_ORG_ID }}'"}' > ~/.vercel/auth.json

          echo '{"projectId":"'${{ secrets.VERCEL_PROJECT_ID }}'","orgId":"'${{ secrets.VERCEL_ORG_ID }}'"}' > ~/.vercel/project.json

          echo "✅ Vercel CLI configured"

      - name: Deploy using Vercel CLI
        run: |
          echo "=== DEPLOYING ==="
          DEPLOY_OUTPUT=$(vercel --prod --prebuilt --confirm --token=${{ secrets.VERCEL_TOKEN }})

          # Get deployment URL from output
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^[:space:]]*\.vercel\.app[^[:space:]]*' | head -1)

          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^[:space:]]*' | head -1)
          fi

          echo "deployment-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOY_URL"
        id: deploy

      - name: Output Results
        run: |
          echo "=== DEPLOYMENT RESULTS ==="
          echo "URL: ${{ steps.deploy.outputs.deployment-url }}"

          if [ -n "${{ steps.deploy.outputs.deployment-url }}" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed - no URL"
            exit 1
          fi
