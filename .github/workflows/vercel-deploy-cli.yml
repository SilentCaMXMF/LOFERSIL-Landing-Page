name: Deploy to Vercel (CLI Direct)

on:
  push:
    branches: [preview-deployment]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Setup Vercel CLI
        run: |
          echo "=== SETTING UP VERCEL ==="
          npm install -g vercel@latest

          mkdir -p ~/.vercel

          echo '{"projectId":"'${{ secrets.VERCEL_PROJECT_ID }}'","orgId":"'${{ secrets.VERCEL_ORG_ID }}'"}' > ~/.vercel/project.json

          echo "✅ Vercel CLI configured"

      - name: Deploy using Vercel CLI
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          echo "=== DEPLOYING ==="

          vercel --prod --prebuilt --confirm --yes

          DEPLOY_URL=$(vercel ls --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --prod --limit=1 | grep -o 'https://[^[:space:]]*' | head -1)

          echo "deployment-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOY_URL"
        id: deploy

      - name: Output Results
        run: |
          echo "=== DEPLOYMENT RESULTS ==="
          echo "URL: ${{ steps.deploy.outputs.deployment-url }}"

          if [ -n "${{ steps.deploy.outputs.deployment-url }}" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed - no URL"
            exit 1
          fi
