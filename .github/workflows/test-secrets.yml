name: Test Secrets Only

on:
  push:
    branches: [preview-deployment]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    name: Test Secrets Only

    steps:
      - name: Test Secrets
        run: |
          echo "=== TESTING SECRETS ==="
          echo "VERCEL_TOKEN set: ${{ secrets.VERCEL_TOKEN != '' }}"
          echo "VERCEL_ORG_ID set: ${{ secrets.VERCEL_ORG_ID != '' }}"
          echo "VERCEL_PROJECT_ID set: ${{ secrets.VERCEL_PROJECT_ID != '' }}"
          echo ""
          echo "VERCEL_ORG_ID value: ${{ secrets.VERCEL_ORG_ID }}"
          echo "VERCEL_PROJECT_ID value: ${{ secrets.VERCEL_PROJECT_ID }}"
          echo "VERCEL_TOKEN length: ${{ secrets.VERCEL_TOKEN && length(secrets.VERCEL_TOKEN) || 0 }}"
          echo ""

          if [[ "${{ secrets.VERCEL_ORG_ID }}" == "team_ZcuPFhSzoazl0h3xEjYyI4Zd" ]]; then
            echo "✅ VERCEL_ORG_ID matches expected value"
          else
            echo "❌ VERCEL_ORG_ID does not match expected value"
          fi

          if [[ "${{ secrets.VERCEL_PROJECT_ID }}" == "prj_HwHNhqjyqXs3pJuw73jKc6QU1hSp" ]]; then
            echo "✅ VERCEL_PROJECT_ID matches expected value"
          else
            echo "❌ VERCEL_PROJECT_ID does not match expected value"
          fi
