name: Test Secrets Only

on:
  push:
    branches: [preview-deployment]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    name: Test Secrets Only

    steps:
      - name: Test Secrets
        run: |
          echo "=== TESTING SECRETS ==="
          echo "VERCEL_TOKEN set: ${{ secrets.VERCEL_TOKEN != '' }}"
          echo "VERCEL_ORG_ID set: ${{ secrets.VERCEL_ORG_ID != '' }}"
          echo "VERCEL_PROJECT_ID set: ${{ secrets.VERCEL_PROJECT_ID != '' }}"
          echo ""

          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN not set"
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ VERCEL_ORG_ID not set"
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ VERCEL_PROJECT_ID not set"
            exit 1
          fi

          echo "✅ All required Vercel secrets are configured"
